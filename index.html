<!DOCTYPE html>
<html>
<head>
  <title>Tender Alerts Italy</title>
</head>
<body>
  <h1>Latest IT Tenders (Italy)</h1>
  <ul id="list"></ul>

  <script>
    fetch("data/tenders.json")
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById("list");

        data.forEach(t => {
          const li = document.createElement("li");
          li.innerHTML = `<a href="${t.link}" target="_blank">${t.title}</a> - ${t.deadline}`;
          list.appendChild(li);
        });
      });
  </script>
</body>
</html>
