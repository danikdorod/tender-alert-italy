name: Fetch Tenders

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python scripts/fetch_tenders.py

      - name: Commit results
        run: |
          git config --global danikdorod "bot"
          git config --global danikdorod@gmail.com "bot@users.noreply.github.com"
          git add data/tenders.json
          git commit -m "update tenders" || echo "no changes"
          git push
